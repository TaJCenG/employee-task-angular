<div class="form-container">
  <h2>Edit Task</h2>
  
  <div *ngIf="loading">Loading task...</div>
  
  <form *ngIf="!loading" [formGroup]="taskForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="title">Title *</label>
      <input id="title" type="text" formControlName="title">
      <div *ngIf="title?.invalid && title?.touched" class="error">
        <span *ngIf="title?.errors?.['required']">Title required</span>
        <span *ngIf="title?.errors?.['minlength']">Minimum 3 characters</span>
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description *</label>
      <textarea id="description" rows="4" formControlName="description"></textarea>
      <div *ngIf="description?.invalid && description?.touched" class="error">
        <span *ngIf="description?.errors?.['required']">Description required</span>
        <span *ngIf="description?.errors?.['maxlength']">Max 500 characters</span>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority" formControlName="priority">
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
      </div>

      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" formControlName="status">
          <option value="pending">Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <div class="form-group">
        <label for="dueDate">Due Date *</label>
        <input type="date" id="dueDate" formControlName="dueDate">
        <div *ngIf="dueDate?.invalid && dueDate?.touched" class="error">Due date required</div>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="taskForm.invalid || submitting">
        {{ submitting ? 'Saving...' : 'Save Changes' }}
      </button>
      <button type="button" (click)="onCancel()">Cancel</button>
    </div>

    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
  </form>
</div>
